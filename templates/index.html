<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talos AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-primary: #0d0d0f;
            --bg-secondary: #13131a;
            --bg-surface: #1a1a24;
            --bg-elevated: #22222e;
            --accent: #c9a84c;
            --accent-dim: #c9a84c33;
            --accent-hover: #e0bc6a;
            --text-primary: #f0ede8;
            --text-secondary: #8a8794;
            --text-muted: #4a4858;
            --border: #2a2838;
            --border-subtle: #1e1d28;
            --user-bubble: #1e3a5f;
            --user-border: #2a5080;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* ── Header ── */
        #header {
            background: var(--bg-secondary);
            padding: 0 24px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            position: relative;
        }

        #header::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-dim), transparent);
        }

        #brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #brand img {
            height: 38px;
            width: auto;
            filter: drop-shadow(0 0 8px rgba(201,168,76,0.35));
        }

        #brand-text {
            display: flex;
            flex-direction: column;
        }

        #brand-name {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 3px;
            color: var(--accent);
            line-height: 1;
        }

        #brand-sub {
            font-size: 10px;
            font-weight: 300;
            color: var(--text-muted);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-top: 3px;
        }

        #header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            width: 34px;
            height: 34px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.18s ease;
        }
        .icon-btn:hover { color: var(--accent); }
        .icon-btn.active { color: var(--accent); }
        .icon-btn.muted { color: var(--text-muted); }

        #status-dot {
            width: 8px; height: 8px;
            background: #3ecf6e;
            border-radius: 50%;
            box-shadow: 0 0 6px #3ecf6e88;
            flex-shrink: 0;
        }

        #status-label {
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        #online-indicator {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 6px 12px;
            border: 1px solid var(--border-subtle);
            border-radius: 20px;
            background: var(--bg-surface);
        }

        /* ── Chat Area ── */
        #chat-wrapper {
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        #chat {
            height: 100%;
            overflow-y: auto;
            padding: 28px 24px 8px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            scroll-behavior: smooth;
        }

        #chat::-webkit-scrollbar { width: 4px; }
        #chat::-webkit-scrollbar-track { background: transparent; }
        #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        .msg-row {
            display: flex;
            flex-direction: column;
            margin-bottom: 12px;
        }
        .msg-row.user { align-items: flex-end; }
        .msg-row.bot { align-items: flex-start; }

        .msg-label {
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 5px;
            padding: 0 4px;
        }

        .bubble {
            padding: 13px 18px;
            border-radius: 16px;
            max-width: 70%;
            line-height: 1.6;
            font-size: 14.5px;
            word-wrap: break-word;
            position: relative;
        }

        .user .bubble {
            background: var(--user-bubble);
            border: 1px solid var(--user-border);
            border-bottom-right-radius: 4px;
            color: #dde8f5;
        }

        .bot .bubble {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
            color: var(--text-primary);
        }

        .bot .bubble::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, var(--accent-dim), transparent);
            border-radius: 16px 16px 0 0;
        }

        /* Typing indicator */
        .typing-row {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 12px;
            padding: 4px 0;
        }

        .typing-bubble {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            border-bottom-left-radius: 4px;
            padding: 14px 20px;
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .dot {
            width: 6px; height: 6px;
            background: var(--accent);
            border-radius: 50%;
            opacity: 0.4;
            animation: blink 1.2s infinite;
        }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes blink {
            0%, 80%, 100% { opacity: 0.25; transform: scale(1); }
            40% { opacity: 1; transform: scale(1.2); }
        }

        /* ── Status Bar ── */
        #status-bar {
            padding: 4px 24px 6px;
            min-height: 22px;
            flex-shrink: 0;
        }

        #status-text {
            font-size: 11.5px;
            color: var(--text-muted);
            letter-spacing: 0.3px;
        }

        /* ── Input Area ── */
        #input-area {
            padding: 14px 24px 20px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-subtle);
            flex-shrink: 0;
        }

        #input-row {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 6px 6px 6px 18px;
            transition: border-color 0.2s;
        }

        #input-row:focus-within {
            border-color: var(--accent-dim);
            box-shadow: 0 0 0 3px rgba(201,168,76,0.06);
        }

        #textInput {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 14.5px;
            padding: 6px 0;
            caret-color: var(--accent);
        }

        #textInput::placeholder { color: var(--text-muted); }
        #textInput:disabled { opacity: 0.4; }

        .action-btn {
            width: 36px; height: 36px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: all 0.18s ease;
            flex-shrink: 0;
            background: none;
            color: var(--text-secondary);
        }

        #voiceBtn:hover { color: var(--accent); }
        #voiceBtn.listening {
            color: var(--accent);
            animation: pulse 1.2s infinite;
        }

        #sendBtn {
            color: var(--accent);
        }
        #sendBtn:hover { color: var(--accent-hover); }
        #sendBtn:disabled { opacity: 0.3; cursor: default; }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(201,168,76,0.4); }
            50% { box-shadow: 0 0 0 6px rgba(201,168,76,0); }
        }

        #input-hint {
            font-size: 11px;
            color: var(--text-muted);
            text-align: center;
            margin-top: 8px;
            letter-spacing: 0.2px;
        }

        /* Fade in animation */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .msg-row { animation: fadeUp 0.2s ease; }
    </style>
</head>
<body>

<div id="header">
    <div id="brand">
        <img src="/static/logo.png" alt="Talos">
        <div id="brand-text">
            <div id="brand-name">TALOS</div>
            <div id="brand-sub">Personal AI</div>
        </div>
    </div>
    <div id="header-actions">
        <div id="online-indicator">
            <div id="status-dot"></div>
            <span id="status-label">Online</span>
        </div>
        <button class="icon-btn active" id="ttsBtn" onclick="toggleTTS()" title="Toggle voice output">🔊</button>
        <button class="icon-btn" id="resetBtn" onclick="resetChat()" title="Clear conversation">↺</button>
    </div>
</div>

<div id="chat-wrapper">
    <div id="chat"></div>
</div>

<div id="status-bar"><span id="status-text"></span></div>

<div id="input-area">
    <div id="input-row">
        <input type="text" id="textInput" placeholder="Message Talos..." onkeydown="if(event.key==='Enter'&&!event.shiftKey) sendMessage()">
        <button class="action-btn" id="voiceBtn" onclick="toggleVoiceInput()" title="Voice input">🎤</button>
        <button class="action-btn" id="sendBtn" onclick="sendMessage()" title="Send">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </div>
    <div id="input-hint">Press Enter to send &nbsp;·&nbsp; Click 🎤 for voice</div>
</div>

<script>
    const chat = document.getElementById('chat');
    const statusText = document.getElementById('status-text');
    const ttsBtn = document.getElementById('ttsBtn');
    const sendBtn = document.getElementById('sendBtn');
    const textInput = document.getElementById('textInput');

    let ttsEnabled = true;
    let recognition = null;
    let isListening = false;

    function setStatus(msg) { statusText.textContent = msg; }

    function toggleTTS() {
        ttsEnabled = !ttsEnabled;
        ttsBtn.textContent = ttsEnabled ? '🔊' : '🔇';
        ttsBtn.classList.toggle('active', ttsEnabled);
        ttsBtn.classList.toggle('muted', !ttsEnabled);
        ttsBtn.title = ttsEnabled ? 'Toggle voice output' : 'Voice muted';
        if (!ttsEnabled) synth.cancel();
    }

    const synth = window.speechSynthesis;
    let preferredVoice = null;

    function loadVoices() {
        const voices = synth.getVoices();

        const deepNames = ['Google UK English Male', 'Microsoft David Desktop', 'Microsoft Mark', 'Alex', 'Daniel', 'Fred'];
        for (const name of deepNames) {
            const v = voices.find(v => v.name === name);
            if (v) { preferredVoice = v; return; }
        }

        preferredVoice = voices.find(v => v.lang.startsWith('en') && v.name.toLowerCase().includes('male'))
                      || voices.find(v => v.lang.startsWith('en'))
                      || voices[0];
    }
    synth.onvoiceschanged = loadVoices;
    loadVoices();

    function speak(text) {
        if (!ttsEnabled) return;
        synth.cancel();

        const msg = new SpeechSynthesisUtterance(text);

        if (preferredVoice) msg.voice = preferredVoice;

        msg.rate = 0.82;
        msg.pitch = 0.65;
        msg.volume = 1;
        synth.speak(msg);
    }

    function addBubble(text, type) {
        const row = document.createElement('div');
        row.className = `msg-row ${type}`;

        const label = document.createElement('div');
        label.className = 'msg-label';
        label.textContent = type === 'user' ? 'You' : 'Talos';

        const b = document.createElement('div');
        b.className = 'bubble';
        b.innerText = text;

        row.appendChild(label);
        row.appendChild(b);
        chat.appendChild(row);
        chat.scrollTop = chat.scrollHeight;
        if (type === 'bot') speak(text);
    }

    function showTyping() {
        const row = document.createElement('div');
        row.className = 'typing-row';
        row.id = 'typing-indicator';
        row.innerHTML = '<div class="typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
        chat.appendChild(row);
        chat.scrollTop = chat.scrollHeight;
    }

    function setLoading(loading) {
        sendBtn.disabled = loading;
        textInput.disabled = loading;
    }

    function toggleVoiceInput() {
        isListening ? stopListening() : startListening();
    }

    function startListening() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) { setStatus('Voice input not supported in this browser.'); return; }

        recognition = new SpeechRecognition();
        recognition.lang = 'en-US';
        recognition.interimResults = false;

        recognition.onstart = () => {
            isListening = true;
            voiceBtn.classList.add('listening');
            voiceBtn.textContent = '⏹';
            setStatus('Listening...');
        };
        recognition.onresult = (e) => {
            textInput.value = e.results[0][0].transcript;
            stopListening();
            sendMessage();
        };
        recognition.onerror = (e) => {
            stopListening();
            setStatus(e.error === 'not-allowed' ? 'Microphone access denied.' : 'Voice error: ' + e.error);
        };
        recognition.onend = () => stopListening();
        recognition.start();
    }

    function stopListening() {
        isListening = false;
        voiceBtn.classList.remove('listening');
        voiceBtn.textContent = '🎤';
        setStatus('');
        if (recognition) { recognition.stop(); recognition = null; }
    }

    async function sendMessage() {
        const message = textInput.value.trim();
        if (!message || sendBtn.disabled) return;

        addBubble(message, 'user');
        textInput.value = '';
        setLoading(true);
        showTyping();

        try {
            const response = await fetch('/ask', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message })
            });
            const data = await response.json();
            document.getElementById('typing-indicator')?.remove();
            addBubble(data.response, 'bot');
        } catch (e) {
            document.getElementById('typing-indicator')?.remove();
            addBubble('Connection error. Please try again.', 'bot');
        }
        setLoading(false);
        textInput.focus();
    }

    async function resetChat() {
        await fetch('/reset', { method: 'POST' });
        chat.innerHTML = '';
        setStatus('Conversation cleared.');
        setTimeout(() => setStatus(''), 2000);
    }
</script>
</body>
</html>
