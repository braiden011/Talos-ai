<!DOCTYPE html>
<html>
<head>
    <title>Talos AI</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .bubble { max-width: 70%; padding: 12px 16px; border-radius: 20px; font-size: 16px; line-height: 1.4; }
        .user { align-self: flex-end; background: #007bff; color: white; border-bottom-right-radius: 2px; }
        .bot { align-self: flex-start; background: #333; color: #00ffcc; border-bottom-left-radius: 2px; border: 1px solid #00ffcc; }
        #controls { padding: 20px; background: #1e1e1e; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 25px; border: none; outline: none; }
        button { padding: 10px 20px; border-radius: 25px; border: none; cursor: pointer; background: #00ffcc; font-weight: bold; }
    </style>
</head>
<body>

<div id="chat-container"></div>

<div id="controls">
    <input type="text" id="userInput" placeholder="Type or use Voice...">
    <button onclick="startVoice()">🎤 Voice</button>
    <button onclick="sendText()">Send</button>
</div>

<script>
    const chatContainer = document.getElementById('chat-container');
    const synth = window.speechSynthesis;

    function addBubble(text, sender) {
        const div = document.createElement('div');
        div.className = `bubble ${sender}`;
        div.innerText = text;
        chatContainer.appendChild(div);
        chatContainer.scrollTop = chatContainer.scrollHeight;
        if(sender === 'bot') {
            const utter = new SpeechSynthesisUtterance(text);
            utter.pitch = 0.8; // Makes Talos sound slightly robotic
            synth.speak(utter);
        }
    }

    function startVoice() {
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'en-US';
        recognition.onresult = (event) => {
            const speechToText = event.results[0][0].transcript;
            addBubble(speechToText, 'user');
            processTalos(speechToText);
        };
        recognition.start();
    }

    function sendText() {
        const input = document.getElementById('userInput');
        if(input.value) {
            addBubble(input.value, 'user');
            processTalos(input.value);
            input.value = '';
        }
    }

    // This is a simplified version of Talos logic for the Web
    function processTalos(input) {
        let response = "I'm listening, Braiden.";
        input = input.lowerCase();

        if(input.includes("hello")) response = "Greetings, Braiden. How can I help?";
        if(input.includes("open journal")) response = "Please enter your passcode in the console.";

        // Timeout to simulate "thinking"
        setTimeout(() => addBubble(response, 'bot'), 600);
    }
</script>
</body>
</html>
